<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preview - Built App</title>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Load and mount the built App (React is bundled) -->
    <script type="module">
      // Reuse mounter.jsx logic, but import from dist/index.js
      import('./mounter.jsx').then(mounterModule => {
        const { mount } = mounterModule;
        
        if (mount) {
          // Mount the built app from dist/index.js
          mount(document.getElementById('root'), './dist/index.js');
          console.log('✅ App mounted successfully from dist/index.js');
        }
      }).catch(err => {
        console.error('❌ Failed to load mounter:', err);
        document.getElementById('root').innerHTML = 
          '<p style="color: red;">Failed to load App. Check console for details.</p>';
      });
    </script>
  </body>
</html>
