<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preview - Built App</title>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Load and mount the built App (React is bundled) -->
    <script type="module">
      import('./dist/index.js').then(module => {
        const { mount } = module
        if (mount) {
          const root = mount(document.getElementById('root'))
          console.log('✅ App mounted successfully from dist/index.js')
        } else {
          console.error('Mount function not exported')
          document.getElementById('root').innerHTML = 
            '<p style="color: red;">Mount function not found</p>'
        }
      }).catch(err => {
        console.error('❌ Failed to load App:', err)
        document.getElementById('root').innerHTML = 
          '<p style="color: red;">Failed to load App. Check console for details.</p>'
      })
    </script>
  </body>
</html>
